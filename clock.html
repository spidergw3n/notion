<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Widget de Reloj 12h (Transparente)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: transparent; /* Fondo del widget 100% transparente */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Nota: Si usas Notion en modo oscuro, cambia el color de abajo a #ffffff */
            color: #37352f; 
        }
        .clock-container {
            text-align: center;
            padding: 10px;
            background-color: transparent; /* Eliminamos el recuadro gris */
        }
        #clock {
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -1px;
        }
        #date {
            font-size: 1.1rem;
            color: #7c7b77;
            margin-top: 5px;
            text-transform: capitalize;
        }
    </style>
</head>
<body>

    <div class="clock-container">
        <div id="clock">00:00:00 AM</div>
        <div id="date">Cargando fecha...</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            let hours = now.getHours();
            let minutes = String(now.getMinutes()).padStart(2, '0');
            let seconds = String(now.getSeconds()).padStart(2, '0');
            
            // Calcular si es AM o PM
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            // Convertir la hora a formato de 12 horas
            hours = hours % 12;
            hours = hours ? hours : 12; // Si es 0 (medianoche), pasa a ser 12
            hours = String(hours).padStart(2, '0');
            
            // Pintar la hora final
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds} ${ampm}`;
            
            // Actualizar fecha en español
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('es-ES', options);
        }

        // Ejecutar cada segundo
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
